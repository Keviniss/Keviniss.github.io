<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xin. - 数字花园</title>
    <style>
        /* 核心变量定义，采用苹果常用的高级灰与纯粹黑白 */
        :root {
            --bg-color: #fbfbfd;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #0066cc;
            --nav-bg: rgba(251, 251, 253, 0.8);
            --font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.47059;
            font-weight: 400;
            letter-spacing: -0.022em;
            -webkit-font-smoothing: antialiased;
        }

        /* 顶部毛玻璃导航栏 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-primary);
            margin-left: 2rem;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .nav-links a:hover {
            opacity: 1;
        }

        /* 页面容器与大面积留白 */
        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 0 5%;
        }

        section {
            padding: 20vh 0 10vh;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 排版与字体层级 */
        h1 {
            font-size: clamp(3rem, 6vw, 5rem);
            font-weight: 600;
            line-height: 1.05;
            letter-spacing: -0.015em;
            margin-bottom: 1.5rem;
        }

        h2 {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 600;
            margin-bottom: 2rem;
            color: var(--text-primary);
        }

        p.subtitle {
            font-size: clamp(1.2rem, 2vw, 1.5rem);
            color: var(--text-secondary);
            font-weight: 400;
            max-width: 600px;
            margin-bottom: 3rem;
            line-height: 1.4;
        }

        /* 书签/网站分享卡片设计 */
        .bookmark-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .bookmark-card {
            display: flex;
            flex-direction: column;
            background: #ffffff;
            border-radius: 20px;
            padding: 2.5rem;
            text-decoration: none; /* 去掉链接下划线 */
            color: inherit;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .bookmark-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.08);
        }

        .bookmark-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* 模拟一个指向外部的小箭头 */
        .bookmark-title::after {
            content: "↗";
            font-family: system-ui;
            font-size: 1.2rem;
            color: var(--text-secondary);
            opacity: 0.5;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .bookmark-card:hover .bookmark-title::after {
            opacity: 1;
            transform: translate(2px, -2px);
            color: var(--accent-color);
        }

        .bookmark-desc {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .bookmark-tag {
            align-self: flex-start;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--bg-color);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            letter-spacing: 0.02em;
        }

        /* 按钮设计 */
        .btn {
            display: inline-block;
            padding: 0.8rem 1.8rem;
            background-color: var(--text-primary);
            color: #fff;
            border-radius: 980px; 
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* 底部版权 */
        footer {
            padding: 4rem 0;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        /* 滚动进入动画 */
        .fade-in-up {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .fade-in-up.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Xin.</div>
        <div class="nav-links">
            <a href="#about">简介</a>
            <a href="#bookmarks">精选分享</a>
            <a href="#contact">联系</a>
        </div>
    </nav>

    <main class="container">
        <section id="about">
            <div class="fade-in-up">
                <h1>你好，<br>我是 Xin。</h1>
                <p class="subtitle">在这里收集并分享高质量的技术资源、工程文献与效率工具。构建属于自己的数字花园。</p>
            </div>
        </section>

        <section id="bookmarks">
            <div class="fade-in-up">
                <h2>灵感与知识。</h2>
            </div>
            <div class="bookmark-grid fade-in-up">
                
                <a href="https://lwn.net/" target="_blank" rel="noopener noreferrer" class="bookmark-card">
                    <div class="bookmark-title">
